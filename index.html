<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Docs</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-dark.min.css">

  <style>
    :root {
      --page-width: 980px;
      --border: rgba(255,255,255,0.18);
      --bg: #0b0f14;
      --text: #ffffff;
      --header-bg: #11161d;
      --link: #7db7ff;
      --link-hover: #a8d0ff;
      --code-bg: rgba(255,255,255,0.06);
      --code-btn-bg: rgba(255,255,255,0.10);
      --code-btn-bg-hover: rgba(255,255,255,0.18);
      --code-btn-border: rgba(255,255,255,0.20);
      --muted: rgba(255,255,255,0.72);
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(6px);
    }

    .wrap {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 16px 24px;
    }

    .title-row {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.25;
      color: #ffffff;
      flex: 1 1 320px;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .release {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      color: #ffffff;
      background: transparent;
      white-space: normal;
      max-width: 100%;
      flex: 0 1 auto;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .release-label {
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
    }

    .release-name {
      font-weight: 700;
      color: #ffffff;
    }

    .release-tag {
      color: var(--muted);
      font-weight: 600;
    }

    main {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 24px;
    }

    .markdown-body {
      background: transparent;
      box-sizing: border-box;
      min-width: 200px;
      margin: 0 auto;
      color: #ffffff !important;
    }

    .markdown-body,
    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6,
    .markdown-body p,
    .markdown-body li,
    .markdown-body blockquote,
    .markdown-body strong,
    .markdown-body em,
    .markdown-body td,
    .markdown-body th,
    .markdown-body code,
    .markdown-body pre {
      color: #ffffff !important;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .markdown-body a,
    .markdown-body a:visited {
      color: var(--link) !important;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .markdown-body a:hover {
      color: var(--link-hover) !important;
    }

    .markdown-body hr,
    .markdown-body table,
    .markdown-body td,
    .markdown-body th,
    .markdown-body blockquote,
    .markdown-body pre,
    .markdown-body code {
      border-color: var(--border) !important;
    }

    .markdown-body pre,
    .markdown-body code,
    .markdown-body blockquote {
      background: var(--code-bg) !important;
    }

    .markdown-body img {
      max-width: 100%;
      height: auto;
    }

    .code-frame {
      position: relative;
      margin: 16px 0;
    }

    .code-frame pre {
      margin: 0 !important;
      padding-top: 3rem !important;
      overflow: auto;
    }

    .copy-code-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 1px solid var(--code-btn-border);
      border-radius: 8px;
      background: var(--code-btn-bg);
      color: #ffffff;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .copy-code-btn:hover {
      background: var(--code-btn-bg-hover);
    }

    .copy-code-btn:active {
      transform: translateY(1px);
    }

    .copy-code-btn.copied {
      width: auto;
      padding: 0 10px;
      font-size: 13px;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 14px 16px;
      }

      .title-row {
        flex-direction: column;
        align-items: stretch;
      }

      h1 {
        flex: 1 1 auto;
        font-size: 18px;
      }

      .release {
        width: 100%;
        justify-content: center;
      }

      main {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap title-row">
      <h1 id="pageTitle">Loading…</h1>
      <div class="release" id="releaseBadge">LATEST RELEASE <strong>…</strong></div>
    </div>
  </header>

  <main>
    <article id="content" class="markdown-body"></article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

  <script>
    const OWNER = "vnetworkx";
    const REPO = "docs";
    const DEFAULT_FILE = "README.md";

    function getCurrentFile() {
      const params = new URLSearchParams(window.location.search);
      return params.get("file") || DEFAULT_FILE;
    }

    function getCurrentHash() {
      return window.location.hash || "";
    }

    function pathDir(path) {
      const idx = path.lastIndexOf("/");
      return idx >= 0 ? path.slice(0, idx + 1) : "";
    }

    function normalizePath(path) {
      const parts = [];
      for (const part of path.split("/")) {
        if (!part || part === ".") continue;
        if (part === "..") {
          if (parts.length) parts.pop();
          continue;
        }
        parts.push(part);
      }
      return parts.join("/");
    }

    function resolveRelativePath(baseFile, relativeHref) {
      if (!relativeHref) return relativeHref;
      if (relativeHref.startsWith("#")) return relativeHref;

      const baseDir = pathDir(baseFile);
      return normalizePath(baseDir + relativeHref);
    }

    function isMarkdownPath(path) {
      return /\.md$|\.markdown$|\.mdown$/i.test(path || "");
    }

    function toSiteRoute(filePath, hash = "") {
      const url = new URL(window.location.href);
      if (filePath && filePath !== DEFAULT_FILE) {
        url.searchParams.set("file", filePath);
      } else {
        url.searchParams.delete("file");
      }
      url.hash = hash || "";
      return url.pathname + url.search + url.hash;
    }

    function escapeAttr(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function rewriteHref(href, baseFile) {
      const trimmed = String(href ?? "").trim();
      if (!trimmed) return trimmed;

      if (trimmed.startsWith("#")) return trimmed;

      const githubBlobPrefixes = [
        `https://github.com/${OWNER}/${REPO}/blob/main/`,
        `https://github.com/${OWNER}/${REPO}/blob/master/`,
        `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/`,
        `https://raw.githubusercontent.com/${OWNER}/${REPO}/master/`
      ];

      for (const prefix of githubBlobPrefixes) {
        if (trimmed.startsWith(prefix)) {
          const rest = trimmed.slice(prefix.length);
          const [pathPart, hashPart] = rest.split("#");
          const [cleanPath, queryPart] = pathPart.split("?");

          if (isMarkdownPath(cleanPath)) {
            const route = toSiteRoute(cleanPath, hashPart ? "#" + hashPart : "");
            return queryPart ? route + "?" + queryPart : route;
          }

          return cleanPath + (queryPart ? "?" + queryPart : "") + (hashPart ? "#" + hashPart : "");
        }
      }

      if (
        trimmed.startsWith("http://") ||
        trimmed.startsWith("https://") ||
        trimmed.startsWith("mailto:") ||
        trimmed.startsWith("tel:")
      ) {
        return trimmed;
      }

      const [hrefPath, hrefHash] = trimmed.split("#");
      const [cleanHrefPath, queryPart] = hrefPath.split("?");

      const resolved = resolveRelativePath(baseFile, cleanHrefPath || "");
      if (!resolved) return trimmed;

      if (isMarkdownPath(resolved)) {
        const route = toSiteRoute(resolved, hrefHash ? "#" + hrefHash : "");
        return queryPart ? route + "?" + queryPart : route;
      }

      return resolved + (queryPart ? "?" + queryPart : "") + (hrefHash ? "#" + hrefHash : "");
    }

    async function loadMarkdown(file) {
      const res = await fetch(file, { cache: "no-store" });
      if (!res.ok) throw new Error(`Markdown fetch failed: ${res.status}`);
      return await res.text();
    }

    function renderMarkdown(md, baseFile) {
      const renderer = new marked.Renderer();

      renderer.link = function (...args) {
        let href, title, text;

        if (args.length === 1 && args[0] && typeof args[0] === "object") {
          const token = args[0];
          href = token.href;
          title = token.title;
          text = token.text ?? "";
        } else {
          [href, title, text] = args;
        }

        const safeHref = rewriteHref(href, baseFile);
        const safeTitle =
          title != null && String(title).trim() !== ""
            ? ` title="${escapeAttr(title)}"`
            : "";

        return `<a href="${escapeAttr(safeHref)}"${safeTitle}>${text}</a>`;
      };

      renderer.image = function (...args) {
        let href, title, text;

        if (args.length === 1 && args[0] && typeof args[0] === "object") {
          const token = args[0];
          href = token.href;
          title = token.title;
          text = token.text ?? "";
        } else {
          [href, title, text] = args;
        }

        const safeHref = rewriteHref(href, baseFile);
        const safeTitle =
          title != null && String(title).trim() !== ""
            ? ` title="${escapeAttr(title)}"`
            : "";
        const safeAlt = ` alt="${escapeAttr(text || "")}"`;

        return `<img src="${escapeAttr(safeHref)}"${safeAlt}${safeTitle}>`;
      };

      renderer.code = function (...args) {
        let code = "";
        let infostring = "";

        if (args.length === 1 && args[0] && typeof args[0] === "object") {
          const token = args[0];
          code = token.text ?? token.code ?? "";
          infostring = token.lang ?? token.info ?? token.infostring ?? "";
        } else {
          [code, infostring] = args;
        }

        const lang = String(infostring || "").trim().split(/\s+/)[0];
        const langClass = lang ? ` class="language-${escapeAttr(lang)}"` : "";
        const encoded = encodeURIComponent(String(code ?? ""));

        return `
          <div class="code-frame">
            <button type="button" class="copy-code-btn" aria-label="Copy code" title="Copy code" data-copy="${escapeAttr(encoded)}">⧉</button>
            <pre><code${langClass}>${escapeHtml(code)}</code></pre>
          </div>
        `;
      };

      marked.setOptions({
        gfm: true,
        breaks: false,
        renderer
      });

      const html = marked.parse(md);
      return DOMPurify.sanitize(html);
    }

    function scrollToHash(hash) {
      if (!hash || hash === "#") return;
      const id = decodeURIComponent(hash.slice(1));
      const el = document.getElementById(id);
      if (el) {
        el.scrollIntoView({ block: "start" });
      }
    }

    async function loadLatestRelease() {
      const badge = document.getElementById("releaseBadge");
      const title = document.getElementById("pageTitle");

      try {
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/releases/latest`, {
          headers: { "Accept": "application/vnd.github+json" }
        });

        if (!res.ok) throw new Error(`Release fetch failed: ${res.status}`);
        const data = await res.json();

        const releaseTitle = (data.name && String(data.name).trim()) ? data.name.trim() : "Untitled release";
        const tag = (data.tag_name && String(data.tag_name).trim()) ? data.tag_name.trim() : "unknown";

        title.textContent = REPO;
        badge.innerHTML = `
          <span class="release-label">LATEST RELEASE</span>
          <span class="release-name">${escapeHtml(releaseTitle)}</span>
          <span class="release-tag">${escapeHtml(tag)}</span>
        `;
        document.title = `${REPO} · ${releaseTitle} · ${tag}`;
      } catch {
        title.textContent = REPO;
        badge.innerHTML = `
          <span class="release-label">LATEST RELEASE</span>
          <span class="release-name">unavailable</span>
        `;
        document.title = REPO;
      }
    }

    async function loadPage() {
      const file = getCurrentFile();
      const hash = getCurrentHash();

      try {
        const md = await loadMarkdown(file);
        document.getElementById("content").innerHTML = renderMarkdown(md, file);
        document.getElementById("pageTitle").textContent = file;
        document.title = `${REPO} · ${file}`;

        requestAnimationFrame(() => scrollToHash(hash));
      } catch (err) {
        document.getElementById("content").innerHTML =
          `<pre>Failed to load page: ${escapeHtml(String(err.message || err))}</pre>`;
        document.getElementById("pageTitle").textContent = "Error";
      }
    }

    function navigateTo(url) {
      history.pushState({}, "", url);
      loadPage();
    }

    async function copyText(text, button) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.setAttribute("readonly", "");
          ta.style.position = "fixed";
          ta.style.left = "-9999px";
          ta.style.top = "0";
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        }

        const original = button.textContent;
        button.textContent = "✓";
        button.classList.add("copied");
        setTimeout(() => {
          button.textContent = original || "⧉";
          button.classList.remove("copied");
        }, 1200);
      } catch {
        const original = button.textContent;
        button.textContent = "!";
        setTimeout(() => {
          button.textContent = original || "⧉";
        }, 1200);
      }
    }

    document.getElementById("content").addEventListener("click", (e) => {
      const copyButton = e.target.closest("button.copy-code-btn");
      if (copyButton) {
        const raw = decodeURIComponent(copyButton.dataset.copy || "");
        copyText(raw, copyButton);
        return;
      }

      const a = e.target.closest("a[href]");
      if (!a) return;

      if (
        e.defaultPrevented ||
        e.button !== 0 ||
        e.metaKey ||
        e.ctrlKey ||
        e.shiftKey ||
        e.altKey ||
        a.target === "_blank" ||
        a.hasAttribute("download")
      ) {
        return;
      }

      const href = a.getAttribute("href") || "";
      const url = new URL(href, window.location.href);

      const sameOrigin = url.origin === window.location.origin;
      const appRoute = sameOrigin && url.pathname === window.location.pathname && url.searchParams.has("file");

      if (appRoute) {
        e.preventDefault();
        navigateTo(url.pathname + url.search + url.hash);
      }
    });

    window.addEventListener("popstate", loadPage);
    window.addEventListener("hashchange", () => scrollToHash(window.location.hash));

    Promise.all([loadLatestRelease(), loadPage()]);
  </script>
</body>
</html>
