<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Docs</title>

  <!-- Use GitHub markdown styling, but we override it for dark text -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-dark.min.css">

  <style>
    :root {
      --page-width: 980px;
      --border: rgba(255,255,255,0.18);
      --bg: #0b0f14;
      --text: #ffffff;
      --muted: #f2f2f2;
      --header-bg: #11161d;
      --link: #8ab4ff;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(6px);
    }

    .wrap {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 16px 24px;
    }

    .title-row {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.2;
      color: #ffffff;
    }

    .release {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 14px;
      color: #ffffff;
      background: transparent;
      white-space: nowrap;
    }

    .release strong {
      color: #ffffff;
      font-weight: 700;
    }

    main {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 24px;
    }

    .markdown-body {
      background: transparent;
      box-sizing: border-box;
      min-width: 200px;
      margin: 0 auto;
      color: #ffffff !important;
    }

    .markdown-body,
    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6,
    .markdown-body p,
    .markdown-body li,
    .markdown-body blockquote,
    .markdown-body strong,
    .markdown-body em,
    .markdown-body td,
    .markdown-body th,
    .markdown-body code,
    .markdown-body pre,
    .markdown-body a {
      color: #ffffff !important;
    }

    .markdown-body a {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .markdown-body hr,
    .markdown-body table,
    .markdown-body td,
    .markdown-body th,
    .markdown-body blockquote,
    .markdown-body pre,
    .markdown-body code {
      border-color: var(--border) !important;
    }

    .markdown-body pre,
    .markdown-body code,
    .markdown-body blockquote {
      background: rgba(255,255,255,0.06) !important;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap title-row">
      <h1 id="pageTitle">Loading…</h1>
      <div class="release" id="releaseBadge">Latest release: <strong>…</strong></div>
    </div>
  </header>

  <main>
    <article id="content" class="markdown-body"></article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

  <script>
    const OWNER = "vnetworkx";
    const REPO  = "docs";
    const README_PATH = "./README.md";

    async function loadMarkdown() {
      const res = await fetch(README_PATH, { cache: "no-store" });
      if (!res.ok) throw new Error(`README fetch failed: ${res.status}`);
      const md = await res.text();
      const html = marked.parse(md, {
        gfm: true,
        breaks: false,
      });
      document.getElementById("content").innerHTML = DOMPurify.sanitize(html);
    }

    async function loadLatestRelease() {
      const badge = document.getElementById("releaseBadge");
      const title = document.getElementById("pageTitle");

      try {
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/releases/latest`, {
          headers: { "Accept": "application/vnd.github+json" }
        });

        if (!res.ok) throw new Error(`Release fetch failed: ${res.status}`);
        const data = await res.json();

        const tag = data.tag_name || "unknown";

        title.textContent = `${REPO}`;
        badge.innerHTML = `Latest release: <strong>${tag}</strong>`;
        document.title = `${REPO} · ${tag}`;
      } catch (e) {
        title.textContent = `${REPO}`;
        badge.innerHTML = `Latest release: <strong>unavailable</strong>`;
        document.title = REPO;
      }
    }

    Promise.all([loadLatestRelease(), loadMarkdown()]).catch(err => {
      document.getElementById("content").innerHTML =
        `<pre>Failed to load page: ${String(err.message || err)}</pre>`;
    });
  </script>
</body>
</html>
