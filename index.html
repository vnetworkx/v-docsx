<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Docs</title>

  <!-- GitHub-like markdown styling -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css">

  <style>
    :root {
      --page-width: 980px;
      --border: #d0d7de;
      --bg: #ffffff;
      --text: #24292f;
      --muted: #57606a;
      --header-bg: #f6f8fa;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --text: #c9d1d9;
        --muted: #8b949e;
        --border: #30363d;
        --header-bg: #161b22;
      }

      .markdown-body {
        color-scheme: dark;
      }
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(6px);
    }

    .wrap {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 16px 24px;
    }

    .title-row {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.2;
    }

    .release {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 14px;
      color: var(--muted);
      background: transparent;
      white-space: nowrap;
    }

    .release strong {
      color: var(--text);
      font-weight: 600;
    }

    main {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 24px;
    }

    .markdown-body {
      background: transparent;
      box-sizing: border-box;
      min-width: 200px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap title-row">
      <h1 id="pageTitle">Loading…</h1>
      <div class="release" id="releaseBadge">Latest release: <strong>…</strong></div>
    </div>
  </header>

  <main>
    <article id="content" class="markdown-body"></article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

  <script>
    // Set these to your repo
    const OWNER = "vnetworkx";
    const REPO  = "docs";

    const README_PATH = "./README.md";

    async function loadMarkdown() {
      const res = await fetch(README_PATH, { cache: "no-store" });
      if (!res.ok) throw new Error(`README fetch failed: ${res.status}`);
      const md = await res.text();
      const html = marked.parse(md, {
        gfm: true,
        breaks: false,
      });
      document.getElementById("content").innerHTML = DOMPurify.sanitize(html);
    }

    async function loadLatestRelease() {
      const badge = document.getElementById("releaseBadge");
      const title = document.getElementById("pageTitle");

      try {
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/releases/latest`, {
          headers: { "Accept": "application/vnd.github+json" }
        });

        if (!res.ok) throw new Error(`Release fetch failed: ${res.status}`);
        const data = await res.json();

        const tag = data.tag_name || "unknown";
        const name = data.name || tag;

        title.textContent = `${REPO}`;
        badge.innerHTML = `Latest release: <strong>${tag}</strong>`;

        document.title = `${REPO} · ${tag}`;
      } catch (e) {
        title.textContent = `${REPO}`;
        badge.innerHTML = `Latest release: <strong>unavailable</strong>`;
        document.title = REPO;
      }
    }

    Promise.all([loadLatestRelease(), loadMarkdown()]).catch(err => {
      document.getElementById("content").innerHTML =
        `<pre>Failed to load page: ${String(err.message || err)}</pre>`;
    });
  </script>
</body>
</html>
